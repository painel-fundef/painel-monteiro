name: Atualizar Painel

on:
  schedule:
    - cron: "*/5 * * * *"  # a cada 5 minutos
  workflow_dispatch:        # botão manual mantido para forçar quando necessário
    inputs:
      motivo:
        description: "Motivo da atualização (opcional)"
        required: false
        default: "Atualização manual"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Verificar se a planilha mudou
        id: check
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID:              ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME:                  ${{ secrets.SHEET_NAME }}
        run: |
          python - << 'PYEOF'
          import json, hashlib, os
          import gspread
          from google.oauth2.service_account import Credentials

          creds = Credentials.from_service_account_info(
              json.loads(os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"]),
              scopes=["https://www.googleapis.com/auth/spreadsheets.readonly"],
          )
          client = gspread.authorize(creds)
          sheet = client.open_by_key(os.environ["SPREADSHEET_ID"]).worksheet(
              os.environ.get("SHEET_NAME", "Monitoramento")
          )
          rows = sheet.get_all_values()
          current_hash = hashlib.sha256(json.dumps(rows, ensure_ascii=False).encode()).hexdigest()

          hash_file = "docs/.data_hash"
          try:
              previous_hash = open(hash_file).read().strip()
          except FileNotFoundError:
              previous_hash = ""

          changed = current_hash != previous_hash
          print(f"Hash anterior : {previous_hash[:16]}…")
          print(f"Hash atual    : {current_hash[:16]}…")
          print(f"Mudou         : {changed}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"changed={'true' if changed else 'false'}\n")
              f.write(f"new_hash={current_hash}\n")
          PYEOF

      - name: Gerar painel (ler Sheets → gravar docs/index.html)
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SPREADSHEET_ID:              ${{ secrets.SPREADSHEET_ID }}
          SHEET_NAME:                  ${{ secrets.SHEET_NAME }}
        run: python build.py

      - name: Commitar e publicar
        if: steps.check.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          echo "${{ steps.check.outputs.new_hash }}" > docs/.data_hash

          git add docs/index.html docs/.data_hash
          git commit -m "painel: dados atualizados $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
